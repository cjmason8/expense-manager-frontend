# EXAMPLE — merge into your real nginx config after you have TLS certificates.
# Let's Encrypt paths are typical on the host; mount them into the container, e.g.:
#   volumes:
#     - /etc/letsencrypt:/etc/letsencrypt:ro
#
# Docker: also map 443:443
#
# server {
#     listen 443 ssl;
#     server_name cjmason8.com www.cjmason8.com;
#
#     ssl_certificate     /etc/letsencrypt/live/cjmason8.com/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/cjmason8.com/privkey.pem;
#
#     root /usr/share/nginx/html;
#     index index.html;
#
#     # Copy the same location blocks from default.conf ( /search, API regex, location / )
#     # or use: include /etc/nginx/conf.d/snippets/expense-manager-locations.conf;
# }
