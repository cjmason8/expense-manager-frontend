# nginx.conf — Vue SPA inside Docker + proxy to Spring on the same machine.
#
# ── How ports relate ─────────────────────────────────────────────────────────
# • Inside this container, nginx listens on :80 only (see listen 80 below).
# • For the public domain, map host :80 → container :80, e.g. docker-compose.prod.yml:
#     ports: ["80:80"]   →  http://cjmason8.com/  reaches this nginx.
# • You may also keep "8085:80" for direct IP:8085 access during migration.
# • Spring should stay on :8083 on the host (or another container). Do NOT point
#   the frontend (VITE_API_BASE_URL) at a different host:port — use same-origin paths.
# • Only one container should bind the host’s port 80. If another stack (e.g. a second
#   nginx image using default.conf) uses -p 80:80, stop it or remove that mapping.
#
# ── Reaching the backend from inside this container ─────────────────────────
# Default below: 172.17.0.1 = Docker bridge gateway → host (works on many Linux setups).
# If that fails, switch upstream to host.docker.internal:8083 and add to compose:
#   extra_hosts:
#     - "host.docker.internal:host-gateway"
# If Spring runs in another container on the same user-defined network, use e.g.:
#   server your-backend-service:8083;

upstream expense_backend {
    server 172.17.0.1:8083;
}

server {
    # default_server: this is the only vhost in the image; wins if extra confs are added.
    listen 80 default_server;
    server_name localhost cjmason8.com www.cjmason8.com;

    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------------------------
    # /search — GET = SPA; POST (etc.) = API
    # -------------------------------------------------------------------------
    location ^~ /search {
        if ($request_method = GET) {
            rewrite ^ /index.html last;
        }

        proxy_pass http://expense_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------------------------
    # API paths (matches frontend axios/fetch — no /api prefix)
    # -------------------------------------------------------------------------
    location ~ ^/(week|recurring|expenses|documents|rentalPayments|refDatas|notifications|incomes|donations)(/|$) {
        proxy_pass http://expense_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------------------------
    # SPA
    # -------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
