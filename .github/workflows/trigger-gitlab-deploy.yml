name: Trigger GitLab Deploy

on:
  push:
    branches: [main]

jobs:
  trigger-deploy:
    # Skip CI version-bump commits to avoid a deploy loop
    if: github.event.head_commit.message != 'bump version'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger GitLab pipeline
        env:
          GITLAB_TRIGGER_TOKEN: ${{ secrets.GITLAB_TRIGGER_TOKEN }}
        run: |
          curl --fail --show-error --silent \
            --request POST \
            --form "token=${GITLAB_TRIGGER_TOKEN}" \
            --form "ref=main" \
            "https://gitlab.com/api/v4/projects/cjmason8-group%2Fexpense-manager-frontend-deploy/trigger/pipeline"
